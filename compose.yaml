name: prolific-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prolific}
      POSTGRES_USER: ${POSTGRES_USER:-prolific}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prolific_local_only}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - prolific-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  prolific-postgres-data:
